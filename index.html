<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简化版植物大战僵尸</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#b8e986;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h1 { color:#2563eb; margin:20px 0; }
#score { font-size:20px; margin:10px; }
#game {
  display:grid;
  grid-template-rows: repeat(5, 80px);
  grid-template-columns: repeat(9, 80px);
  gap:2px;
  background:#77b22f;
  border:4px solid #3b7a1f;
  margin-bottom:20px;
}
.cell {
  width:80px;
  height:80px;
  background: rgba(255,255,255,0.1);
  position: relative;
}
.plant {
  width:60px; height:60px;
  background:#22c55e;
  border-radius:10px;
  position:absolute;
  bottom:0; left:10px;
}
.zombie {
  width:60px; height:60px;
  background:#ef4444;
  border-radius:10px;
  position:absolute;
  bottom:0;
}
.bullet {
  width:10px; height:10px;
  background:#2563eb;
  position:absolute;
  border-radius:50%;
}
</style>
</head>
<body>
<h1>简化版植物大战僵尸</h1>
<div id="score">积分: 0</div>
<div id="game"></div>

<script>
const rows = 5, cols = 9;
const game = document.getElementById('game');
let cells = [], plants = [], zombies = [], bullets = [];
let score = 0;

// 初始化格子
for(let r=0;r<rows;r++){
  cells[r]=[];
  for(let c=0;c<cols;c++){
    const cell = document.createElement('div');
    cell.className='cell';
    cell.dataset.row=r;
    cell.dataset.col=c;
    game.appendChild(cell);
    cells[r][c]=cell;
    cell.onclick = ()=>plantClick(r,c);
  }
}

// 点击格子种植豌豆射手
function plantClick(r,c){
  if(plants.some(p=>p.row===r && p.col===c)) return;
  const plantEl = document.createElement('div');
  plantEl.className='plant';
  cells[r][c].appendChild(plantEl);
  plants.push({row:r,col:c,el:plantEl,fireTimer:0});
}

// 随机生成僵尸
function spawnZombie(){
  const r = Math.floor(Math.random()*rows);
  const zombieEl = document.createElement('div');
  zombieEl.className='zombie';
  zombieEl.style.right='0px';
  cells[r][cols-1].appendChild(zombieEl);
  zombies.push({row:r,col:cols-1,el:zombieEl,x:0});
}

// 游戏循环
function gameLoop(){
  // 植物发射子弹
  plants.forEach(p=>{
    p.fireTimer++;
    if(p.fireTimer%30===0){ // 每30帧发射一颗子弹
      const bulletEl = document.createElement('div');
      bulletEl.className='bullet';
      const cell = cells[p.row][p.col];
      bulletEl.style.left='60px';
      bulletEl.style.bottom='35px';
      cell.appendChild(bulletEl);
      bullets.push({row:p.row,col:p.col,el:bulletEl,x:cell.offsetLeft+60});
    }
  });

  // 子弹移动
  bullets.forEach((b,i)=>{
    b.el.style.left = (parseInt(b.el.style.left)+5)+'px';
    // 检测碰撞僵尸
    zombies.forEach((z,j)=>{
      if(b.row===z.row){
        const bulletRight = parseInt(b.el.style.left)+10;
        const zombieLeft = z.el.offsetLeft;
        if(bulletRight >= zombieLeft){
          // 消灭僵尸
          z.el.remove();
          zombies.splice(j,1);
          b.el.remove();
          bullets.splice(i,1);
          score++;
          document.getElementById('score').innerText='积分: '+score;
        }
      }
    });
    // 超出右边界删除
    if(parseInt(b.el.style.left) > 80*cols){
      b.el.remove();
      bullets.splice(i,1);
    }
  });

  // 僵尸移动
  zombies.forEach((z,i)=>{
    z.x+=0.5;
    z.el.style.left = -z.x+'px';
    if(z.x>80*cols){
      alert('游戏结束! 得分:'+score);
      location.reload();
    }
  });

  requestAnimationFrame(gameLoop);
}

// 定时生成僵尸
setInterval(spawnZombie,2000);

// 启动循环
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
