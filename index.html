<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>问道修仙录 - 文字修仙</title>

<style>
body{
background:#0b0f1a;
color:#e6e6e6;
font-family:Arial;
margin:0;
padding:0;
}

#game{
width:900px;
margin:auto;
padding:20px;
}

button{
background:#1f2a44;
color:white;
border:none;
padding:10px;
margin:5px;
cursor:pointer;
}

.panel{
background:#11182c;
padding:15px;
margin-top:10px;
}

.log{
height:200px;
overflow:auto;
background:#0c1224;
padding:10px;
}
</style>

</head>

<body>

<div id="game">

<h1>问道修仙录（H5试玩）</h1>

<div class="panel">
<div id="player"></div>
</div>

<div class="panel">
<button onclick="cultivate()">打坐修炼</button>
<button onclick="explore()">探索</button>
<button onclick="fight()">打怪</button>
<button onclick="alchemy()">炼丹</button>
<button onclick="forge()">炼器</button>
</div>

<div class="panel log" id="log"></div>

</div>

<script>

const roots=[
{name:"凡品金灵根",speed:0.6},
{name:"凡品木灵根",speed:0.6},
{name:"凡品水灵根",speed:0.6},
{name:"凡品火灵根",speed:0.6},
{name:"凡品土灵根",speed:0.6},

{name:"中品金灵根",speed:0.8},
{name:"中品木灵根",speed:0.8},
{name:"中品水灵根",speed:0.8},

{name:"上品火灵根",speed:1},
{name:"上品土灵根",speed:1},

{name:"天灵根",speed:10},
{name:"雷灵根",speed:50},
{name:"冰灵根",speed:50},
{name:"风灵根",speed:50},

{name:"仙灵根",speed:1000},
{name:"混沌灵根",speed:1000000}
]

const traits=[
"悟性超凡",
"鸿运当头",
"战神转世",
"丹道奇才",
"器道天才",
"天命之子",
"气运平平",
"引雷入体",
"寒髓之体"
]

const monsters=[
{name:"山魈",hp:20,atk:4,exp:10},
{name:"毒狼",hp:30,atk:6,exp:15},
{name:"赤焰蟒",hp:50,atk:10,exp:25}
]

let player={
hp:100,
maxHp:100,
atk:10,
exp:0,
realm:"炼气",
spiritStone:50,
root:null,
traits:[]
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function init(){

player.root=random(roots)

for(let i=0;i<3;i++){
player.traits.push(random(traits))
}

log("你踏入修仙界")
log("灵根："+player.root.name)
log("天命词条："+player.traits.join("、"))

render()
}

function cultivate(){

let gain=Math.floor(10*player.root.speed)

player.exp+=gain

log("打坐修炼，修为+"+gain)

render()

}

function explore(){

let r=Math.random()

if(r<0.3){

log("你发现了一株灵草")

}

else if(r<0.6){

log("你发现了一块矿石")

}

else{

triggerEncounter()

}

}

function triggerEncounter(){

let events=[
"你遇到神秘老者",
"你发现上古洞府",
"你获得奇异感悟"
]

log("奇遇："+random(events))

}

function fight(){

let m=JSON.parse(JSON.stringify(random(monsters)))

log("你遭遇 "+m.name)

while(m.hp>0 && player.hp>0){

m.hp-=player.atk

player.hp-=m.atk

}

if(player.hp<=0){

player.hp=player.maxHp

log("你战败逃走")

}

else{

player.exp+=m.exp

log("击败 "+m.name+" 获得修为 "+m.exp)

}

render()

}

function alchemy(){

if(Math.random()<0.6){

log("炼丹成功")

}

else{

log("炼丹失败")

}

}

function forge(){

if(Math.random()<0.5){

player.atk+=2

log("炼器成功 攻击+2")

}

else{

log("炼器失败")

}

render()

}

function render(){

document.getElementById("player").innerHTML=`
HP: ${player.hp}/${player.maxHp} <br>
攻击: ${player.atk} <br>
修为: ${player.exp} <br>
灵石: ${player.spiritStone} <br>
境界: ${player.realm}
`

}

function log(t){

let l=document.getElementById("log")

l.innerHTML=t+"<br>"+l.innerHTML

}

init()

</script>

</body>
</html>
